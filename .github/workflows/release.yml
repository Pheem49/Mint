name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    name: Build Linux release artifacts
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl file pkg-config wget \
            libdbus-1-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            poppler-utils unzip patchelf

      - name: Install Node dependencies
        run: npm ci

      - name: Typecheck UI
        run: npm run typecheck

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --no-deps

      - name: Run Rust tests
        run: cargo test -p mint-core -p mint-cli

      - name: Build desktop bundle
        run: npm run tauri:build

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          cp target/release/bundle/deb/*.deb release-artifacts/
          cp target/release/bundle/tar/*.tar.gz release-artifacts/

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mint-linux-release
          path: release-artifacts/*
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
